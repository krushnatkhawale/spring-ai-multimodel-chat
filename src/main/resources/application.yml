spring:
  application:
    name: spring-ai-multi-chat
  
  ai:
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 500ms
        multiplier: 2
        max-interval: 2000ms
    openai:
      api-key: ${OPENAI_API_KEY:mock-key}
      chat:
        options:
          model: gpt-4o-mini
    
    google:
      genai:
        api-key: ${GEMINI_API_KEY:mock-key}
        chat:
          options:
            model: gemini-2.5-flash
            
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3

multichat:
  fallback-sequence:
    - gemini
    - openai
    - local